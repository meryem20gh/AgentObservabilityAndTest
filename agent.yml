name: CI/CD - Agent Robustness & Observability Tests

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-agent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Configuration de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Optimise le temps de build en mettant en cache les dépendances

    - name: Installation des dépendances
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Exécution des tests de robustesse avec Pytest
      env:
        # Variables requises pour l'observabilité LangSmith
        LANGCHAIN_TRACING_V2: "true"
        LANGCHAIN_ENDPOINT: "https://api.smith.langchain.com"
        LANGCHAIN_PROJECT: "observability-ci-cd-tests"
        # Secrets GitHub à configurer dans les paramètres de votre dépôt
        LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        pytest test_agent.py -v --durations=0